# TODO(2026-09-16): bump action @v* pins to Node-24-compatible majors
# before this date. Node 20 default flips 2026-06-02 (opt-out via env);
# Node 20 removed from runners 2026-09-16 (no opt-out). Dependabot
# (.github/dependabot.yml) opens auto-PRs as new majors ship.
#
# Release workflow — fires on `vX.Y.Z` (or `vX.Y.Z(rc|a|b)N`) tag pushes.
#
# Pipeline:
#   classify-tag → build → { gh-release, publish-pypi }
#
# - classify-tag    pulls is_prerelease + clean version from the git ref
#                   and fails the workflow if the tag pattern is wrong.
# - build           sets up Node + pnpm + Python; runs the frontend build
#                   helper with --pack to produce the release tarball +
#                   sha256 sidecar; builds the wheel + sdist (the wheel
#                   embeds the prebuilt static via the existing
#                   package-data rule); uploads everything as artifacts.
# - gh-release      attaches tarball, sidecar, wheel, sdist to the
#                   GitHub Release; marks pre-release tags accordingly.
# - publish-pypi    OIDC-publishes to PyPI (final tags) or TestPyPI
#                   (pre-release tags). Trusted Publishing is configured
#                   on each PyPI side via a pending publisher matching
#                   this repo + workflow + environment name. No tokens.
#
# Required one-time setup:
#   1. PyPI pending publisher: project=constellation-bio, owner=wilburnlab,
#      repo=constellation, workflow=release.yml, environment=pypi
#   2. TestPyPI pending publisher: same except environment=testpypi
#   3. GitHub environments `pypi` and `testpypi` (Settings → Environments).
#      `pypi` should restrict deployments to `v*` tags; `testpypi` is
#      protection-free. Required Reviewers on `pypi` is the recommended
#      human-in-the-loop gate (only available once the repo is public).

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to build (must be a v* tag)'
        required: true
        type: string

jobs:
  classify-tag:
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
      version: ${{ steps.classify.outputs.version }}
    steps:
      - name: Resolve tag
        id: classify
        run: |
          set -eu
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ inputs.ref }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag: ${REF}"
          # Final release: vX.Y.Z (no pre-release suffix). Strict pattern
          # so a typo fails fast instead of triggering a real publish.
          if [[ "${REF}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
            echo "classification: final release"
          # Pre-release: vX.Y.Z{rc|a|b}N. Routes to TestPyPI.
          elif [[ "${REF}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(rc|a|b)[0-9]+$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
            echo "classification: pre-release"
          else
            echo "::error::tag '${REF}' does not match vX.Y.Z or vX.Y.Z(rc|a|b)N"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: classify-tag
    outputs:
      version: ${{ needs.classify-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools-scm needs full git history to derive the version
          # from the tag. Shallow clones break version detection.
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: constellation/viz/frontend/package.json

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools setuptools-scm

      - name: Install constellation (so the build helper imports cleanly)
        run: |
          python -m pip install -e .

      - name: Build + pack frontend
        run: |
          python -m constellation.viz.frontend.build --pack

      - name: Build wheel + sdist
        # The wheel picks up constellation/viz/static/<entry>/ via the
        # existing package-data rule (set in pyproject.toml). The static
        # tree was populated in the previous step.
        run: |
          python -m build

      - name: Verify wheel + sdist
        run: |
          python -m pip install twine
          python -m twine check dist/constellation_bio-*.whl dist/constellation_bio-*.tar.gz

      - name: Upload python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/constellation_bio-*.whl
            dist/constellation_bio-*.tar.gz
          if-no-files-found: error

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            dist/constellation-viz-frontend-*.tar.gz
            dist/constellation-viz-frontend-*.tar.gz.sha256
          if-no-files-found: error

  gh-release:
    runs-on: ubuntu-latest
    needs: [classify-tag, build]
    permissions:
      contents: write   # required to create / update the release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.ref || github.ref_name }}
          prerelease: ${{ needs.classify-tag.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/constellation-viz-frontend-*.tar.gz
            dist/constellation-viz-frontend-*.tar.gz.sha256
            dist/constellation_bio-*.whl
            dist/constellation_bio-*.tar.gz
          fail_on_unmatched_files: true

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [classify-tag, build]
    environment:
      name: ${{ needs.classify-tag.outputs.is_prerelease == 'true' && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write   # OIDC trusted publishing — no API token required
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Publish to TestPyPI
        if: needs.classify-tag.outputs.is_prerelease == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
      - name: Publish to PyPI
        if: needs.classify-tag.outputs.is_prerelease == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
