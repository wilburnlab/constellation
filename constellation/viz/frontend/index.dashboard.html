<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constellation Dashboard</title>
    <style>
      /* Palette inspired by the Aura theme by Dalton Menezes (MIT,
         https://github.com/daltonmenezes/aura-theme); accent selection
         informed by the Raycast port by Shubh Porwal. Values adapted
         for Constellation's elevation needs, not copied verbatim. See
         NOTICE.md at the repo root. */
      :root {
        --bg: #15141b;
        --bg-elev: #1c1a25;
        --bg-elev2: #252231;
        --bg-rail: #110f18;
        --fg: #edecee;
        --fg-dim: #adacae;
        --fg-mute: #6d6d6d;
        --accent: #a277ff;
        --accent-rgb: 162, 119, 255;
        --accent-soft: rgba(var(--accent-rgb), 0.15);
        --accent-alt: #61ffca;
        --accent-alt-rgb: 97, 255, 202;
        --border: #2d2b3a;
        --border-strong: #3b334b;
        --danger: #ff6767;
        --warn: #ffca85;
        --ok: #61ffca;

        /* dockview-core variable overrides — soften the default look */
        --dv-tab-border-radius: 6px;
        --dv-border-radius: 6px;
        --dv-sash-border-radius: 4px;
        --dv-dropdown-border-radius: 6px;
        --dv-tabs-and-actions-container-height: 32px;
        --dv-tabs-and-actions-container-font-size: 12px;
        --dv-tab-font-size: 12px;
        --dv-group-view-background-color: var(--bg);
        --dv-tabs-and-actions-container-background-color: var(--bg-elev);
        --dv-activegroup-visiblepanel-tab-background-color: var(--bg);
        --dv-activegroup-hiddenpanel-tab-background-color: var(--bg-elev2);
        --dv-inactivegroup-visiblepanel-tab-background-color: var(--bg-elev2);
        --dv-inactivegroup-hiddenpanel-tab-background-color: var(--bg-elev);
        --dv-activegroup-visiblepanel-tab-color: var(--fg);
        --dv-activegroup-hiddenpanel-tab-color: var(--fg-dim);
        --dv-inactivegroup-visiblepanel-tab-color: var(--fg-dim);
        --dv-inactivegroup-hiddenpanel-tab-color: var(--fg-mute);
        --dv-tab-divider-color: var(--border);
        --dv-sash-color: var(--border);
        --dv-active-sash-color: var(--accent);
        --dv-drag-over-background-color: var(--accent-soft);
        --dv-drag-over-border-color: var(--accent);
        --dv-floating-box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        --dv-icon-hover-background-color: var(--border);
        --dv-scrollbar-background-color: var(--border);
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        font-size: 13px;
        background: var(--bg);
        color: var(--fg);
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #main-row {
        flex: 1 1 auto;
        display: flex;
        flex-direction: row;
        min-height: 0;
      }
      #dock {
        flex: 1 1 auto;
        position: relative;
        overflow: hidden;
      }

      /* Shell sidebar — persistent collapsible rail outside dockview. */
      #shell-sidebar {
        flex: 0 0 auto;
        width: 280px;
        display: flex;
        flex-direction: column;
        background: var(--bg-rail);
        border-right: 1px solid var(--border);
        overflow: hidden;
        transition: width 200ms ease;
      }
      #shell-sidebar.collapsed {
        width: 48px;
      }
      #shell-sidebar-header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid var(--border);
        color: var(--fg);
      }
      #shell-sidebar.collapsed #shell-sidebar-header {
        justify-content: center;
        padding: 10px 0;
      }
      #shell-sidebar-header:hover { background: var(--bg-elev); }
      #shell-sidebar-logo {
        flex: 0 0 auto;
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
      }
      #shell-sidebar-logo svg { width: 100%; height: 100%; }
      #shell-sidebar-wordmark {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #shell-sidebar.collapsed #shell-sidebar-wordmark { display: none; }
      #shell-sidebar-body {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #shell-sidebar.collapsed #shell-sidebar-body { display: none; }
      #shell-sidebar-rail {
        flex: 1 1 auto;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px 0;
      }
      #shell-sidebar.collapsed #shell-sidebar-rail {
        display: flex;
      }
      .shell-rail-btn {
        background: transparent;
        color: var(--fg-dim);
        border: 0;
        width: 32px;
        height: 32px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
      }
      .shell-rail-btn:hover { background: var(--bg-elev); color: var(--fg); }
      .shell-rail-btn.active { color: var(--accent); }

      /* Sidebar entries at the narrow width — allow text to wrap rather
       * than truncate so verbose command labels stay readable. Compact
       * paddings to keep the rail visually tight. */
      #shell-sidebar-body .sidebar {
        background: transparent;  /* host rail provides --bg-rail */
      }
      #shell-sidebar-body .sidebar-entry {
        padding: 6px 10px;
      }
      #shell-sidebar-body .sidebar-entry-label {
        white-space: normal;
        word-break: break-word;
      }
      #shell-sidebar-body .sidebar-entry-path {
        white-space: normal;
        word-break: break-all;
        line-height: 1.3;
      }
      #shell-sidebar-body .sidebar-entry-hint {
        word-break: break-word;
      }
      #shell-sidebar-body .sidebar-group {
        padding: 10px 10px 4px 10px;
      }

      #statusbar {
        flex: 0 0 auto;
        height: 26px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 12px;
        background: var(--bg-elev);
        border-top: 1px solid var(--border);
        color: var(--fg-dim);
        font-size: 12px;
      }
      #statusbar .status-running { color: var(--accent); }
      #statusbar .status-idle { color: var(--fg-mute); }
      #statusbar .status-failed { color: var(--danger); }

      /* Sidebar ---------------------------------------------------- */
      .sidebar {
        background: var(--bg-elev);
        height: 100%;
        display: flex;
        flex-direction: column;
        font-size: 12px;
      }
      .sidebar-toolbar {
        flex: 0 0 auto;
        padding: 8px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .sidebar-mode {
        display: flex;
        gap: 0;
        border: 1px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
      }
      .sidebar-mode button {
        flex: 1;
        background: var(--bg);
        color: var(--fg-dim);
        border: 0;
        padding: 4px 8px;
        cursor: pointer;
        font-size: 12px;
      }
      .sidebar-mode button.active {
        background: var(--bg-elev2);
        color: var(--fg);
      }
      .sidebar-search {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 8px;
        font-family: ui-monospace, SF Mono, Menlo, monospace;
        font-size: 12px;
        width: 100%;
      }
      .sidebar-tree {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 6px 0;
      }
      .sidebar-group {
        padding: 8px 12px 4px 12px;
        color: var(--fg-mute);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .sidebar-entry {
        padding: 4px 12px;
        cursor: pointer;
        color: var(--fg);
        display: flex;
        flex-direction: column;
      }
      .sidebar-entry:hover { background: var(--bg-elev2); }
      .sidebar-entry.active { background: var(--accent-soft); }
      .sidebar-entry-label {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .sidebar-entry-path {
        color: var(--fg-mute);
        font-family: ui-monospace, SF Mono, Menlo, monospace;
        font-size: 10px;
        margin-top: 1px;
      }
      .sidebar-entry-hint {
        color: var(--fg-dim);
        font-size: 11px;
        margin-top: 2px;
        line-height: 1.3;
      }

      /* CommandForm ------------------------------------------------- */
      .command-form {
        padding: 12px 16px;
        overflow-y: auto;
        height: 100%;
        background: var(--bg);
      }
      .command-form h2 {
        margin: 0 0 4px 0;
        font-size: 14px;
        font-weight: 500;
      }
      .command-form .form-cmd {
        font-family: ui-monospace, SF Mono, Menlo, monospace;
        color: var(--fg-dim);
        font-size: 11px;
        margin-bottom: 12px;
      }
      .command-form .form-section {
        margin-bottom: 16px;
      }
      .command-form .form-section-header {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--fg-mute);
        margin-bottom: 6px;
        cursor: pointer;
      }
      .command-form .form-section-header.collapsible::before {
        content: '▼ ';
      }
      .command-form .form-section-header.collapsed::before {
        content: '▶ ';
      }
      .command-form .form-row {
        margin-bottom: 10px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .command-form label {
        font-size: 12px;
        color: var(--fg);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .command-form label .flag-name {
        font-family: ui-monospace, SF Mono, Menlo, monospace;
        color: var(--fg-dim);
        font-size: 11px;
      }
      .command-form .form-help {
        color: var(--fg-dim);
        font-size: 11px;
        line-height: 1.4;
      }
      .command-form input[type='text'],
      .command-form input[type='number'],
      .command-form select {
        background: var(--bg-elev);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 8px;
        font-family: ui-monospace, SF Mono, Menlo, monospace;
        font-size: 12px;
        width: 100%;
      }
      .command-form input.invalid { border-color: var(--danger); }
      .command-form .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .command-form button.run {
        background: var(--accent);
        color: white;
        border: 0;
        border-radius: 4px;
        padding: 6px 16px;
        cursor: pointer;
        font-size: 12px;
      }
      .command-form button.run:disabled {
        background: var(--border);
        color: var(--fg-mute);
        cursor: not-allowed;
      }
      .command-form .form-error {
        color: var(--danger);
        font-size: 11px;
        margin-left: 12px;
        align-self: center;
      }

      /* Terminal panel --------------------------------------------- */
      .terminal-panel {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: var(--bg-rail);
      }
      .terminal-header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 10px;
        background: var(--bg-elev);
        border-bottom: 1px solid var(--border);
        font-size: 11px;
        color: var(--fg-dim);
      }
      .terminal-header .terminal-cmd {
        flex: 1;
        font-family: ui-monospace, SF Mono, Menlo, monospace;
        color: var(--fg);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .terminal-header .terminal-elapsed {
        font-family: ui-monospace, SF Mono, Menlo, monospace;
      }
      .terminal-header button {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 11px;
      }
      .terminal-header button:hover { background: var(--border); }
      .terminal-body {
        flex: 1 1 auto;
        overflow: hidden;
        padding: 4px 0 0 6px;
      }

      /* Welcome panel ---------------------------------------------- */
      .welcome {
        padding: 24px;
        height: 100%;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        color: var(--fg-dim);
      }
      .welcome h1 {
        margin: 0;
        font-size: 18px;
        color: var(--fg);
        font-weight: 500;
      }
      .welcome a { color: var(--accent); }
      .welcome code {
        font-family: ui-monospace, SF Mono, Menlo, monospace;
        font-size: 11px;
        color: var(--fg);
      }
      .welcome-tagline {
        margin: 0 0 8px 0;
      }
      .welcome-links {
        margin-top: 24px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
      }
      .welcome-link {
        display: block;
        text-align: left;
        text-decoration: none;
        background: var(--bg-elev);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 12px;
        font: inherit;
        cursor: pointer;
      }
      .welcome-link:hover {
        border-color: var(--accent);
      }
      .welcome-link-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--fg);
        margin-bottom: 4px;
      }
      .welcome-link-desc {
        font-size: 11px;
        color: var(--fg-dim);
      }

      /* Task panel (hosts CommandForm/VizForm/Terminal/GenomeBrowser) */
      .task-panel {
        height: 100%;
        background: var(--bg);
      }
      .task-error {
        padding: 24px;
        color: var(--danger);
        font-size: 13px;
      }

      /* VizForm — mirrors CommandForm styling so phase-1 looks
       * identical regardless of compute vs viz category. */
      .viz-form {
        padding: 12px 16px;
        overflow-y: auto;
        height: 100%;
        background: var(--bg);
      }
      .viz-form h2 {
        margin: 0 0 8px 0;
        font-size: 14px;
        font-weight: 500;
      }
      .viz-form .form-help {
        color: var(--fg-dim);
        font-size: 11px;
        line-height: 1.4;
        margin-bottom: 12px;
      }
      .viz-form .form-section { margin-bottom: 16px; }
      .viz-form .form-row {
        margin-bottom: 10px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .viz-form label {
        font-size: 12px;
        color: var(--fg);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .viz-form input[type='text'] {
        background: var(--bg-elev);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 8px;
        font-family: ui-monospace, SF Mono, Menlo, monospace;
        font-size: 12px;
        width: 100%;
      }
      .viz-form .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .viz-form button.run {
        background: var(--accent);
        color: white;
        border: 0;
        border-radius: 4px;
        padding: 6px 16px;
        cursor: pointer;
        font-size: 12px;
      }
      .viz-form button.run:disabled {
        background: var(--border);
        color: var(--fg-mute);
        cursor: not-allowed;
      }
      .viz-form .form-error {
        color: var(--danger);
        font-size: 11px;
        margin-left: 12px;
        align-self: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="main-row">
        <div id="shell-sidebar">
          <div id="shell-sidebar-header" title="Toggle commands">
            <span id="shell-sidebar-logo" aria-hidden="true">
              <!-- Placeholder constellation/sparkle glyph; final logo TBD. -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="1.6" stroke-linecap="round"
                   stroke-linejoin="round">
                <circle cx="6" cy="7" r="1.4" fill="currentColor"/>
                <circle cx="18" cy="6" r="1.4" fill="currentColor"/>
                <circle cx="12" cy="13" r="1.4" fill="currentColor"/>
                <circle cx="7" cy="18" r="1.4" fill="currentColor"/>
                <circle cx="17" cy="17" r="1.4" fill="currentColor"/>
                <path d="M6 7 L12 13 L18 6 M12 13 L7 18 M12 13 L17 17"
                      opacity="0.55"/>
              </svg>
            </span>
            <span id="shell-sidebar-wordmark">Constellation</span>
          </div>
          <div id="shell-sidebar-body"></div>
          <div id="shell-sidebar-rail">
            <button type="button" class="shell-rail-btn"
                    data-rail="common" title="Common commands">★</button>
            <button type="button" class="shell-rail-btn"
                    data-rail="all" title="All commands">☰</button>
            <button type="button" class="shell-rail-btn"
                    data-rail="search" title="Search commands">⌕</button>
          </div>
        </div>
        <div id="dock"></div>
      </div>
      <div id="statusbar">
        <span class="status-text status-idle">Idle</span>
      </div>
    </div>
    <script type="module" src="/src/main_dashboard.ts"></script>
  </body>
</html>
