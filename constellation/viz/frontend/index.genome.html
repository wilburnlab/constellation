<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constellation — Genome Browser</title>
    <style>
      :root {
        --bg: #0f0f12;
        --bg-elev: #18181d;
        --fg: #e3e3e8;
        --fg-dim: #8a8a93;
        --accent: #4f9efb;
        --border: #2a2a33;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        font-size: 13px;
        background: var(--bg);
        color: var(--fg);
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .toolbar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background: var(--bg-elev);
        border-bottom: 1px solid var(--border);
      }
      .toolbar input {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 13px;
        font-family: ui-monospace, SF Mono, Menlo, monospace;
      }
      .toolbar button {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 13px;
      }
      .toolbar button:hover { background: var(--border); }
      .toolbar select {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 8px;
      }
      .label-dim { color: var(--fg-dim); }
      .browser {
        flex: 1 1 auto;
        overflow: auto;
        position: relative;
      }
      .track {
        border-bottom: 1px solid var(--border);
      }
      .track-header {
        padding: 4px 12px;
        background: var(--bg-elev);
        font-size: 12px;
        color: var(--fg-dim);
        border-bottom: 1px solid var(--border);
      }
      .track-canvas {
        display: block;
        background: var(--bg);
      }
      .ruler {
        background: var(--bg-elev);
        border-bottom: 1px solid var(--border);
      }
      svg text { fill: var(--fg); }
      svg .axis-line { stroke: var(--fg-dim); }
      svg .axis-tick { stroke: var(--fg-dim); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main_genome.ts"></script>
  </body>
</html>
